name: Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-js:
    name: JS Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: tests/package.json

      - name: Install dependencies
        working-directory: tests
        run: npm ci

      - name: Run tests with coverage
        working-directory: tests
        run: npm test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-js
          path: tests/coverage/
          retention-days: 14

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install rat-frontend dependencies
        run: pip install -r rat-frontend/requirements_rat_frontend.txt

      - name: Install additional test dependencies
        run: pip install pytest beautifulsoup4 lxml psutil langdetect textstat

      - name: Run unit tests
        run: python -m pytest tests/ --ignore=tests/routes --ignore=tests/node_modules -v

      - name: Run route tests
        run: python -m pytest tests/routes/ -v
