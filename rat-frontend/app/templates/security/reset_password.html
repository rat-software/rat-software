{% extends "master.html" %}

{% block title %}Reset password{% endblock %}

{% block content %}
{% include "security/_messages.html" %}

<div class="card col-md-6 offset-md-3">
    <div class="card-body">
        <h4 class="crd-header">Reset password</h4>
        <p class="my-3">
            Please enter your new password to activate your account.
        </p>

        <form action="" method="POST" name="reset_password_form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="mb-3">
                <label class="form-label fw-bold">New Password</label>
                <input type="password" name="password" class="form-control" required autocomplete="new-password">
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Confirm New Password</label>
                <input type="password" name="password_confirm" class="form-control" required autocomplete="new-password">
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary">Save New Password</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
